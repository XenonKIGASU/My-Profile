<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Size QR Pixel Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      #qrGrid {
        display: grid;
        gap: 1px;
        background-color: #ddd;
        border: 4px solid #333;
        margin: 0 auto;
      }
      .cell {
        background-color: white;
        cursor: pointer;
        aspect-ratio: 1 / 1;
      }
      .cell.black {
        background-color: black;
      }
      .cell.fixed {
        cursor: not-allowed;
        position: relative;
      }
      .cell.fixed::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(59, 130, 246, 0.2);
      }
      .cell.system-black {
        background-color: black;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen p-4">
    <div
      class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden"
    >
      <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
        <h1 class="text-xl font-bold">QRピクセル逆算ツール (多サイズ対応)</h1>
        <div class="flex items-center gap-2">
          <label for="versionSelect" class="text-sm font-medium">サイズ:</label>
          <select
            id="versionSelect"
            class="bg-white text-blue-800 px-2 py-1 rounded text-sm font-bold outline-none"
          >
            <option value="1">Ver 1 (21x21)</option>
            <option value="2">Ver 2 (25x25)</option>
            <option value="3">Ver 3 (29x29)</option>
            <option value="4">Ver 4 (33x33)</option>
          </select>
        </div>
      </div>

      <div class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Left Side: Grid -->
        <div class="flex flex-col items-center">
          <div id="qrGrid" class="w-full max-w-[450px]"></div>
          <div class="mt-4 flex gap-4 text-xs">
            <div class="flex items-center gap-1">
              <span class="w-3 h-3 border bg-white"></span> 描画可能(白)
            </div>
            <div class="flex items-center gap-1">
              <span class="w-3 h-3 border bg-black"></span> 描画可能(黒)
            </div>
            <div class="flex items-center gap-1">
              <span class="w-3 h-3 border bg-blue-200"></span> 固定領域
            </div>
          </div>
        </div>

        <!-- Right Side: Info and Output -->
        <div class="space-y-6">
          <div class="bg-blue-50 border-l-4 border-blue-500 p-4">
            <p class="text-sm text-blue-700">
              <strong>仕組み:</strong>
              模様から逆算して、QRの「データ領域」に入るビット列を割り出します。
              <br /><span class="text-xs"
                >※右下部分はエラー訂正コードが配置されるため、描画しても実際のQR生成時には無視される可能性があります。</span
              >
            </p>
          </div>

          <div class="space-y-2">
            <div class="flex justify-between items-end">
              <label class="block text-sm font-bold text-gray-700"
                >生成された文字列</label
              >
              <span
                id="dataInfo"
                class="text-[10px] text-gray-500 font-mono"
              ></span>
            </div>
            <textarea
              id="outputArea"
              readonly
              class="w-full h-40 p-3 text-sm font-mono border rounded bg-gray-50 focus:outline-none"
              placeholder="ピクセルを描くとここにデータが出現します..."
            ></textarea>
          </div>

          <div class="flex gap-3">
            <button
              id="clearBtn"
              class="flex-1 py-3 px-4 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold rounded-lg transition"
            >
              リセット
            </button>
            <button
              id="copyBtn"
              class="flex-1 py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition shadow-lg"
            >
              コピー
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const gridEl = document.getElementById("qrGrid");
      const versionSelect = document.getElementById("versionSelect");
      const outputArea = document.getElementById("outputArea");
      const dataInfo = document.getElementById("dataInfo");
      const clearBtn = document.getElementById("clearBtn");
      const copyBtn = document.getElementById("copyBtn");

      let currentVersion = 1;
      let size = 21;
      let pixels = [];

      // アライメントパターンの中心座標 (Ver 1-4用)
      const alignmentCoords = { 1: [], 2: [18], 3: [22], 4: [26] };

      function isFixed(r, c) {
        // Finder patterns & Separators
        if (
          (r < 9 && c < 9) ||
          (r < 9 && c >= size - 9) ||
          (r >= size - 9 && c < 9)
        )
          return true;
        // Timing patterns
        if (r === 6 || c === 6) return true;
        // Alignment patterns
        const centers = alignmentCoords[currentVersion];
        for (let cr of centers) {
          for (let cc of centers) {
            // 他のパターンと重ならない場合のみ
            if (
              !(
                (cr < 9 && cc < 9) ||
                (cr < 9 && cc >= size - 9) ||
                (cr >= size - 9 && cc < 9)
              )
            ) {
              if (Math.abs(r - cr) <= 2 && Math.abs(c - cc) <= 2) return true;
            }
          }
        }
        return false;
      }

      function isSystemBlack(r, c) {
        // Finder pattern visual representation
        const checkFinder = (r, c) =>
          r === 0 ||
          r === 6 ||
          c === 0 ||
          c === 6 ||
          (r >= 2 && r <= 4 && c >= 2 && c <= 4);
        if (r < 7 && c < 7) return checkFinder(r, c);
        if (r < 7 && c >= size - 7) return checkFinder(r, c - (size - 7));
        if (r >= size - 7 && c < 7) return checkFinder(r - (size - 7), c);

        // Alignment pattern visual
        const centers = alignmentCoords[currentVersion];
        for (let cr of centers) {
          for (let cc of centers) {
            if (
              !(
                (cr < 9 && cc < 9) ||
                (cr < 9 && cc >= size - 9) ||
                (cr >= size - 9 && cc < 9)
              )
            ) {
              const dr = Math.abs(r - cr),
                dc = Math.abs(c - cc);
              if (dr === 2 || dc === 2 || (dr === 0 && dc === 0)) return true;
            }
          }
        }
        // Timing
        if (r === 6 && c % 2 === 0) return true;
        if (c === 6 && r % 2 === 0) return true;
        return false;
      }

      function initGrid() {
        currentVersion = parseInt(versionSelect.value);
        size = (currentVersion - 1) * 4 + 21;
        pixels = Array(size)
          .fill()
          .map(() => Array(size).fill(0));

        gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        gridEl.innerHTML = "";

        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            if (isFixed(r, c)) {
              cell.classList.add("fixed");
              if (isSystemBlack(r, c)) cell.classList.add("system-black");
            } else {
              cell.onclick = () => {
                pixels[r][c] = pixels[r][c] === 0 ? 1 : 0;
                cell.classList.toggle("black");
                updateOutput();
              };
            }
            gridEl.appendChild(cell);
          }
        }
        updateOutput();
      }

      function updateOutput() {
        let bits = "";
        let dataPixelCount = 0;

        // QR規格のジグザグ走査 (右下から開始)
        for (let c = size - 1; c > 0; c -= 2) {
          if (c === 6) c--; // Skip timing column
          let range = Array.from({ length: size }, (_, i) => i);
          if (((size - 1 - c) / 2) % 2 === 0) range.reverse(); // Up / Down toggle

          for (let r of range) {
            for (let col of [c, c - 1]) {
              if (!isFixed(r, col)) {
                let visual = pixels[r][col];
                let mask = (r + col) % 2 === 0 ? 1 : 0; // Mask 0
                bits += visual ^ mask;
                dataPixelCount++;
              }
            }
          }
        }

        // バイト変換
        let rawData = "";
        for (let i = 0; i < bits.length; i += 8) {
          let byteStr = bits.substr(i, 8);
          if (byteStr.length < 8) break;
          rawData += String.fromCharCode(parseInt(byteStr, 2));
        }

        const b64 = btoa(unescape(encodeURIComponent(rawData)));
        outputArea.value = `[Data String]\n${rawData}\n\n[Base64 Encoded]\n${b64}`;
        dataInfo.innerText = `${dataPixelCount} bits (${Math.floor(dataPixelCount / 8)} bytes)`;
      }

      versionSelect.onchange = initGrid;
      clearBtn.onclick = initGrid;
      copyBtn.onclick = () => {
        outputArea.select();
        document.execCommand("copy");
      };

      window.onload = initGrid;
    </script>
  </body>
</html>
